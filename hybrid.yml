---
# ===============================================================
# HYBRID VALKEY CLUSTER SHRINK APPROACH
# ===============================================================
#
# WHAT THIS DOES:
# 1) For each node in nodes_to_remove:
#      - If REPLICA → directly delete from cluster
#      - If MASTER  → move ALL its slots to ONE pinned destination master
#                     (single-pass reshard = fastest possible removal)
#      - Repoint its replicas to the pinned destination master
#      - Delete the master
#
# 2) OPTIONAL:
#      - After all removals, run a full cluster rebalance
#        to redistribute slots evenly across remaining masters.
#
# WHY HYBRID?
# - Fast + predictable removal (single reshard per master)
# - Cleaner steady state afterward if rebalance enabled
#
# BEST FOR:
# - Maintenance window shrink
# - Emergency node evacuation
# - When speed matters but balance is still desired afterward
#
# ===============================================================

- name: HYBRID - Remove Valkey nodes with fast reshard + optional rebalance
  hosts: localhost
  gather_facts: false

  vars:
    seed_host: "10.0.0.11"
    seed_port: 7000

    # Nodes to remove (ip:port)
    nodes_to_remove:
      - "10.0.0.15:7000"
      - "10.0.0.16:7000"

    # Pinned destination master (temporary sink)
    dest_master_endpoint: "10.0.0.12:7000"

    # Enable final rebalance step (recommended true in production)
    do_rebalance: true

  tasks:

    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - nodes_to_remove | length > 0
          - ":" in dest_master_endpoint

    - name: Process each node removal
      loop: "{{ nodes_to_remove }}"
      loop_control:
        loop_var: target_node
      block:

        # -----------------------------------
        # Read current cluster topology
        # -----------------------------------
        - name: Read CLUSTER NODES
          ansible.builtin.command: >
            valkey-cli -h {{ seed_host }} -p {{ seed_port }} CLUSTER NODES
          register: cluster_nodes
          changed_when: false

        - name: Identify target and destination lines
          ansible.builtin.set_fact:
            target_line: >-
              {{
                (cluster_nodes.stdout_lines
                  | select('search', target_node)
                  | list | first) | default('')
              }}
            dest_line: >-
              {{
                (cluster_nodes.stdout_lines
                  | select('search', dest_master_endpoint)
                  | list | first) | default('')
              }}

        - name: Validate existence
          ansible.builtin.fail:
            msg: "Target or destination not found in cluster."
          when: target_line == '' or dest_line == ''

        - name: Parse node metadata
          ansible.builtin.set_fact:
            target_node_id: "{{ target_line.split()[0] }}"
            dest_master_id: "{{ dest_line.split()[0] }}"
            is_master: "{{ ' master ' in (' ' ~ target_line ~ ' ') }}"
            is_replica: "{{ ' slave ' in (' ' ~ target_line ~ ' ') }}"
            slot_tokens: "{{ target_line.split()[8:] if (target_line.split() | length) > 8 else [] }}"

        - name: Prevent self-destination mistake
          ansible.builtin.fail:
            msg: "Cannot remove destination master itself."
          when: target_node_id == dest_master_id

        # -----------------------------------
        # Replica removal (simple case)
        # -----------------------------------
        - name: Delete replica node
          ansible.builtin.command: >
            valkey-cli --cluster del-node {{ seed_host }}:{{ seed_port }} {{ target_node_id }}
          when: is_replica

        # -----------------------------------
        # Master removal (fast path)
        # -----------------------------------
        - name: Compute total slot count for master
          ansible.builtin.set_fact:
            slot_total: >-
              {%- set total = 0 -%}
              {%- for r in slot_tokens -%}
              {%- if '-' in r -%}
              {%- set a = (r.split('-')[0] | int) -%}
              {%- set b = (r.split('-')[1] | int) -%}
              {%- set total = total + (b - a + 1) -%}
              {%- endif -%}
              {%- endfor -%}
              {{ total }}
          when: is_master

        - name: Fast reshard - move ALL slots to pinned destination
          ansible.builtin.command: >
            valkey-cli --cluster reshard {{ seed_host }}:{{ seed_port }}
            --cluster-from {{ target_node_id }}
            --cluster-to {{ dest_master_id }}
            --cluster-slots {{ slot_total | int }}
            --cluster-yes
          when: is_master and slot_total > 0

        - name: Refresh cluster state after reshard
          ansible.builtin.command: >
            valkey-cli -h {{ seed_host }} -p {{ seed_port }} CLUSTER NODES
          register: nodes_after
          when: is_master
          changed_when: false

        - name: Find replicas of removed master
          ansible.builtin.set_fact:
            replicas_of_target: >-
              {{
                (nodes_after.stdout_lines
                  | select('search', 'slave ' ~ target_node_id)
                  | list)
              }}
          when: is_master

        - name: Repoint replicas to pinned destination
          ansible.builtin.command: >
            valkey-cli -h {{ (item.split()[1].split(':')[0]) }}
            -p {{ (item.split()[1].split(':')[1].split('@')[0]) }}
            CLUSTER REPLICATE {{ dest_master_id }}
          loop: "{{ replicas_of_target | default([]) }}"
          when: is_master and replicas_of_target | length > 0

        - name: Delete master node
          ansible.builtin.command: >
            valkey-cli --cluster del-node {{ seed_host }}:{{ seed_port }} {{ target_node_id }}
          when: is_master

        - name: Removal summary
          ansible.builtin.debug:
            msg:
              - "Removed {{ target_node }}"
              - "Role={{ 'master' if is_master else 'replica' }}"
              - "Slots moved={{ slot_total | default(0) }}"
              - "Destination master={{ dest_master_endpoint }}"

    # -----------------------------------
    # Final global rebalance (optional)
    # -----------------------------------
    - name: Rebalance cluster after removals
      ansible.builtin.command: >
        valkey-cli --cluster rebalance {{ seed_host }}:{{ seed_port }} --cluster-yes
      when: do_rebalance
      run_once: true

    - name: Final cluster info
      ansible.builtin.command: >
        valkey-cli -h {{ seed_host }} -p {{ seed_port }} CLUSTER INFO
      register: final_cluster_info
      run_once: true
      changed_when: false

    - name: Print final cluster state
      ansible.builtin.debug:
        var: final_cluster_info.stdout
