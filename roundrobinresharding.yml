---
#1) Round-robin redistribution across remaining masters
#What it does: split the slots you’re moving across all remaining masters in a simple rotating order (no “load” awareness).
#Pros: simple, reasonably balanced, deterministic, easy to automate.
#Cons: not optimal if masters are already uneven (can make imbalance worse).
#Best for: fast automation when your cluster is usually already balanced.
#Mechanic: multi-pass reshard where each pass targets the next master in the list.

# remove_nodes_round_robin.yml
# Round-robin redistribution across remaining masters (no load awareness)
# - User provides nodes_to_remove as ["ip:port", ...]
# - For replicas: del-node
# - For masters: compute owned slots, distribute across remaining masters in rotating order,
#   perform multi-pass reshard, repoint replicas, then del-node

- name: Remove Valkey nodes using Round-Robin redistribution
  hosts: localhost
  gather_facts: false

  vars:
    seed_host: "10.0.0.11"
    seed_port: 7000

    # Nodes to remove (ip:port)
    nodes_to_remove:
      - "10.0.0.15:7000"
      - "10.0.0.16:7000"

    rotate_across_removals: true

  tasks:

    - name: Validate input
      ansible.builtin.assert:
        that:
          - nodes_to_remove | length > 0

    - name: Process each node
      loop: "{{ nodes_to_remove }}"
      loop_control:
        loop_var: target_node
        index_var: remove_index
      block:

        # ---------------------------
        # Read cluster topology
        # ---------------------------
        - name: Read cluster nodes
          ansible.builtin.command: >
            valkey-cli -h {{ seed_host }} -p {{ seed_port }} CLUSTER NODES
          register: cluster_nodes
          changed_when: false

        - name: Find target line
          ansible.builtin.set_fact:
            target_line: >-
              {{
                (cluster_nodes.stdout_lines
                  | select('search', target_node)
                  | list
                  | first) | default('')
              }}

        - name: Fail if target not found
          ansible.builtin.fail:
            msg: "Target {{ target_node }} not found."
          when: target_line == ''

        - name: Parse node info
          ansible.builtin.set_fact:
            target_node_id: "{{ target_line.split()[0] }}"
            is_master: "{{ ' master ' in (' ' ~ target_line ~ ' ') }}"
            is_replica: "{{ ' slave ' in (' ' ~ target_line ~ ' ') }}"
            slot_tokens: "{{ target_line.split()[8:] if (target_line.split() | length) > 8 else [] }}"

        # ---------------------------
        # Replica removal
        # ---------------------------
        - name: Remove replica directly
          ansible.builtin.command: >
            valkey-cli --cluster del-node {{ seed_host }}:{{ seed_port }} {{ target_node_id }}
          when: is_replica

        # ---------------------------
        # Master removal
        # ---------------------------
        - name: Compute slot count
          ansible.builtin.set_fact:
            slot_total: >-
              {%- set total = 0 -%}
              {%- for r in slot_tokens -%}
              {%- if '-' in r -%}
              {%- set a = (r.split('-')[0] | int) -%}
              {%- set b = (r.split('-')[1] | int) -%}
              {%- set total = total + (b - a + 1) -%}
              {%- endif -%}
              {%- endfor -%}
              {{ total }}
          when: is_master

        - name: Build destination masters list
          ansible.builtin.set_fact:
            dest_master_ids: >-
              {{
                (cluster_nodes.stdout_lines
                  | select('search', ' master ')
                  | reject('search', '^' ~ target_node_id)
                  | map('regex_search', '^[0-9a-f]+')
                  | select('string')
                  | list)
              }}
          when: is_master

        - name: Fail if last master
          ansible.builtin.fail:
            msg: "Cannot remove last master."
          when: is_master and (dest_master_ids | length == 0)

        - name: Set round robin offset
          ansible.builtin.set_fact:
            rr_offset: "{{ remove_index % (dest_master_ids | length) if rotate_across_removals else 0 }}"
          when: is_master

        - name: Build move plan
          ansible.builtin.set_fact:
            k: "{{ dest_master_ids | length }}"
            base: "{{ slot_total // k }}"
            rem: "{{ slot_total % k }}"
            move_plan: >-
              {%- set plan = [] -%}
              {%- for i in range(0, k) -%}
              {%- set idx = (i + rr_offset) % k -%}
              {%- set slots = base + (1 if i < rem else 0) -%}
              {%- if slots > 0 -%}
              {%- set _ = plan.append([dest_master_ids[idx], slots]) -%}
              {%- endif -%}
              {%- endfor -%}
              {{ plan }}
          when: is_master

        - name: Round robin reshard passes
          ansible.builtin.command: >
            valkey-cli --cluster reshard {{ seed_host }}:{{ seed_port }}
            --cluster-from {{ target_node_id }}
            --cluster-to {{ item[0] }}
            --cluster-slots {{ item[1] }}
            --cluster-yes
          loop: "{{ move_plan }}"
          when: is_master and slot_total > 0

        - name: Re-read cluster after reshard
          ansible.builtin.command: >
            valkey-cli -h {{ seed_host }} -p {{ seed_port }} CLUSTER NODES
          register: nodes_after
          when: is_master
          changed_when: false

        - name: Find replicas of removed master
          ansible.builtin.set_fact:
            replicas_of_target: >-
              {{
                (nodes_after.stdout_lines
                  | select('search', 'slave ' ~ target_node_id)
                  | list)
              }}
          when: is_master

        - name: Repoint replicas to first destination
          ansible.builtin.command: >
            valkey-cli -h {{ (item.split()[1].split(':')[0]) }}
            -p {{ (item.split()[1].split(':')[1].split('@')[0]) }}
            CLUSTER REPLICATE {{ dest_master_ids[0] }}
          loop: "{{ replicas_of_target }}"
          when: is_master and replicas_of_target | length > 0

        - name: Delete master
          ansible.builtin.command: >
            valkey-cli --cluster del-node {{ seed_host }}:{{ seed_port }} {{ target_node_id }}
          when: is_master

        - name: Print summary
          ansible.builtin.debug:
            msg:
              - "Removed {{ target_node }}"
              - "Role={{ 'master' if is_master else 'replica' }}"
              - "Slots moved={{ slot_total | default(0) }}"
